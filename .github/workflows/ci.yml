name: CI Checks
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package*.json'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'action.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'package*.json'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'action.yml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # every day at midnight

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - run: npm ci
      - run: npm run lint

  check-dist:
    name: Check Distribution
    runs-on: ubuntu-latest
    env:
      BUNDLE_FILE: "dist/index.js"
      BUNDLE_COMMAND: "npm run bundle"
    steps:
      - uses: actions/checkout@v7

      - name: Install
        run: npm ci

      - name: Verify Latest Bundle
        uses: redhat-actions/common/bundle-verifier@v2
        with:
          bundle_file: ${{ env.BUNDLE_FILE }}
          bundle_command: ${{ env.BUNDLE_COMMAND }}

  check-inputs-outputs:
    name: Check Input and Output enums
    runs-on: ubuntu-latest
    env:
      IO_FILE: ./src/generated/inputs-outputs.ts
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: npm ci

      - name: Verify Input and Output enums
        uses: redhat-actions/common/action-io-generator@v2
        with:
          io_file: ${{ env.IO_FILE }}
